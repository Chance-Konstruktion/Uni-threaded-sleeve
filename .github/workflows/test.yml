name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile-check
        run: python -m compileall -q __init__.py api.py database.py presets.py rod_link.py sleeve_builder.py ui_panel.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
